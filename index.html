<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart Login Page</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="left">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/036/235/198/small/ai-generated-wicker-laundry-basket-with-towels-on-white-table-top-in-laundry-room-photo.jpg" 
                 alt="Laundry Image">
        </div>

        <div class="right">
            <form>
                <h1> Hello Again! </h1>
                <p> Welcome Back! We missed you!</p>

                <label>Email</label>
                <input type="email" placeholder="Email ID" required>

                <label>Password</label>
                <input type="password" placeholder="Password" required>

                <div class="forgot">
                    <a href="#"> Forgot Password </a>
                </div>
                <br/><br/>
                <button type="submit"> Login </button>
                <p class="register"> Not a Member?
                    <a href="#"> Register Now </a>
                </p>
                
            </form>
        </div>

    </div>
</body>
</html>
